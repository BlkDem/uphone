version: "3.8"

services:
  mariadb:
    image: mariadb:11.4
    container_name: uphone-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-uphone_root}
      MYSQL_DATABASE: ${DB_NAME:-uphone}
      MYSQL_USER: ${DB_USER:-uphone}
      MYSQL_PASSWORD: ${DB_PASSWORD:-uphone_secret}
    ports:
      - "3308:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ../server
      dockerfile: ../docker/Dockerfile.server
    container_name: uphone-server
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: ${DB_USER:-uphone}
      DB_PASSWORD: ${DB_PASSWORD:-uphone_secret}
      DB_NAME: ${DB_NAME:-uphone}
      SERVER_PORT: ${SERVER_PORT:-8080}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      UPLOAD_BASE_URL: http://192.168.1.18:8080
      FCM_CREDENTIALS: /app/service-account.json
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-uphone_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-uphone_minio_secret}
      MINIO_BUCKET: uphone-uploads
      MINIO_USE_SSL: "false"
    ports:
      - "8080:8080"
    volumes:
      - ../server/service-account.json:/app/service-account.json:ro

  minio:
    image: minio/minio:latest
    container_name: uphone-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-uphone_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-uphone_minio_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  mariadb_data:
  minio_data:
