<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPhone Admin — Пользователи</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
        .header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; }
        .header a { color: #666; text-decoration: none; font-size: 14px; }
        .header a:hover { color: #333; }
        .container { max-width: 1000px; margin: 24px auto; padding: 0 24px; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .toolbar h2 { font-size: 18px; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: background 0.2s; }
        .btn-primary { background: #4a90d9; color: #fff; }
        .btn-primary:hover { background: #357abd; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-danger:hover { background: #c0392b; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background: #fafafa; font-weight: 600; font-size: 13px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
        td { font-size: 14px; }
        tr:hover td { background: #f9f9f9; }
        .role-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .role-admin { background: #e8f0fe; color: #1a73e8; }
        .role-user { background: #f0f0f0; color: #666; }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .status-online { background: #34a853; }
        .status-offline { background: #ccc; }
        .actions { display: flex; gap: 6px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: #fff; border-radius: 8px; padding: 24px; width: 100%; max-width: 440px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .modal h3 { margin-bottom: 16px; font-size: 18px; }
        .modal .form-group { margin-bottom: 12px; }
        .modal label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: #333; }
        .modal input, .modal select { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .modal input:focus, .modal select:focus { outline: none; border-color: #4a90d9; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
        .btn-cancel { background: #f0f0f0; color: #333; }
        .btn-cancel:hover { background: #e0e0e0; }
        .empty { text-align: center; padding: 40px; color: #999; }
        .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 6px; color: #fff; font-size: 14px; z-index: 200; display: none; }
        .toast-success { background: #34a853; }
        .toast-error { background: #e74c3c; }
    </style>
</head>
<body>
    <div class="header">
        <h1>UPhone Admin</h1>
        <a href="/admin/logout">Выйти</a>
    </div>

    <div class="container">
        <div class="toolbar">
            <h2>Пользователи</h2>
            <button class="btn btn-primary" onclick="openCreateModal()">+ Добавить</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Имя</th>
                    <th>Email</th>
                    <th>Username</th>
                    <th>Роль</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="users-table">
                <tr><td colspan="6" class="empty">Загрузка...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal-content"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API = '/api/v1/admin';

        function getToken() {
            return document.cookie.split('; ').find(c => c.startsWith('admin_token='))?.split('=')[1] || '';
        }

        async function api(method, path, body) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            const token = getToken();
            if (token) opts.headers['Authorization'] = 'Bearer ' + token;
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(API + path, opts);
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Ошибка');
            return data;
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast toast-' + type;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        async function loadUsers() {
            try {
                const users = await api('GET', '/users');
                const tbody = document.getElementById('users-table');
                if (!users.length) {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty">Нет пользователей</td></tr>';
                    return;
                }
                tbody.innerHTML = users.map(u => `
                    <tr>
                        <td>${escapeHtml(u.display_name)}</td>
                        <td>${escapeHtml(u.email)}</td>
                        <td>${escapeHtml(u.username)}</td>
                        <td><span class="role-badge role-${u.role}">${u.role === 'admin' ? 'Админ' : 'Пользователь'}</span></td>
                        <td><span class="status-dot status-${u.status}"></span>${u.status === 'online' ? 'Онлайн' : 'Офлайн'}</td>
                        <td class="actions">
                            <button class="btn btn-sm btn-primary" onclick="openRoleModal('${u.id}', '${u.role}')">Роль</button>
                            <button class="btn btn-sm btn-primary" onclick="openPasswordModal('${u.id}')">Пароль</button>
                            <button class="btn btn-sm btn-danger" onclick="confirmDelete('${u.id}', '${escapeHtml(u.username)}')">Удалить</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                showToast('Ошибка загрузки: ' + e.message, 'error');
            }
        }

        function openModal(html) {
            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('modal-overlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('active');
        }

        function openCreateModal() {
            openModal(`
                <h3>Новый пользователь</h3>
                <div class="form-group"><label>Username</label><input id="m-username" required></div>
                <div class="form-group"><label>Email</label><input id="m-email" type="email" required></div>
                <div class="form-group"><label>Отображаемое имя</label><input id="m-display"></div>
                <div class="form-group"><label>Пароль</label><input id="m-password" type="password" required></div>
                <div class="form-group"><label>Роль</label><select id="m-role"><option value="user">Пользователь</option><option value="admin">Админ</option></select></div>
                <div class="modal-actions">
                    <button class="btn btn-cancel" onclick="closeModal()">Отмена</button>
                    <button class="btn btn-primary" onclick="createUser()">Создать</button>
                </div>
            `);
        }

        async function createUser() {
            try {
                await api('POST', '/users', {
                    username: document.getElementById('m-username').value,
                    email: document.getElementById('m-email').value,
                    display_name: document.getElementById('m-display').value || document.getElementById('m-username').value,
                    password: document.getElementById('m-password').value,
                    role: document.getElementById('m-role').value,
                });
                closeModal();
                showToast('Пользователь создан', 'success');
                loadUsers();
            } catch (e) {
                showToast('Ошибка: ' + e.message, 'error');
            }
        }

        function openRoleModal(id, currentRole) {
            openModal(`
                <h3>Изменить роль</h3>
                <div class="form-group">
                    <label>Роль</label>
                    <select id="m-new-role">
                        <option value="user" ${currentRole==='user'?'selected':''}>Пользователь</option>
                        <option value="admin" ${currentRole==='admin'?'selected':''}>Админ</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-cancel" onclick="closeModal()">Отмена</button>
                    <button class="btn btn-primary" onclick="changeRole('${id}')">Сохранить</button>
                </div>
            `);
        }

        async function changeRole(id) {
            try {
                await api('PUT', '/users/' + id + '/role', { role: document.getElementById('m-new-role').value });
                closeModal();
                showToast('Роль обновлена', 'success');
                loadUsers();
            } catch (e) {
                showToast('Ошибка: ' + e.message, 'error');
            }
        }

        function openPasswordModal(id) {
            openModal(`
                <h3>Сменить пароль</h3>
                <div class="form-group"><label>Новый пароль</label><input id="m-new-pass" type="password" required></div>
                <div class="modal-actions">
                    <button class="btn btn-cancel" onclick="closeModal()">Отмена</button>
                    <button class="btn btn-primary" onclick="changePassword('${id}')">Сохранить</button>
                </div>
            `);
        }

        async function changePassword(id) {
            try {
                await api('POST', '/users/' + id + '/password', { password: document.getElementById('m-new-pass').value });
                closeModal();
                showToast('Пароль обновлён', 'success');
            } catch (e) {
                showToast('Ошибка: ' + e.message, 'error');
            }
        }

        function confirmDelete(id, username) {
            openModal(`
                <h3>Удалить пользователя?</h3>
                <p style="margin-bottom:16px;color:#666;">Пользователь <strong>${username}</strong> будет удалён.</p>
                <div class="modal-actions">
                    <button class="btn btn-cancel" onclick="closeModal()">Отмена</button>
                    <button class="btn btn-danger" onclick="deleteUser('${id}')">Удалить</button>
                </div>
            `);
        }

        async function deleteUser(id) {
            try {
                await api('DELETE', '/users/' + id);
                closeModal();
                showToast('Пользователь удалён', 'success');
                loadUsers();
            } catch (e) {
                showToast('Ошибка: ' + e.message, 'error');
            }
        }

        document.getElementById('modal-overlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        loadUsers();
    </script>
</body>
</html>
